<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Go Tutor">
  <rect width="512" height="512" rx="96" fill="#b9842f"/>
  <!-- board grid -->
  <g stroke="#3a2a16" stroke-width="8" stroke-linecap="round">
    <line x1="128" y1="128" x2="128" y2="384"/>
    <line x1="256" y1="128" x2="256" y2="384"/>
    <line x1="384" y1="128" x2="384" y2="384"/>
    <line x1="128" y1="128" x2="384" y2="128"/>
    <line x1="128" y1="256" x2="384" y2="256"/>
    <line x1="128" y1="384" x2="384" y2="384"/>
  </g>
  <!-- stones -->
  <circle cx="128" cy="128" r="44" fill="#1a1a1a"/>
  <circle cx="384" cy="384" r="44" fill="#1a1a1a"/>
  <circle cx="384" cy="128" r="44" fill="#f6f6f6"/>
  <circle cx="256" cy="256" r="44" fill="#f6f6f6"/>
  <circle cx="128" cy="384" r="44" fill="#f6f6f6"/>
</svg>
